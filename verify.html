<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validando · Bertani App</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 24px;
    }
    .verify-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-bright);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin: 0 0 8px; color: var(--text); }
    .message {
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.5;
      margin: 12px 0 0;
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
      color: var(--warn);
    }
    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
      color: var(--green);
    }
    .btn-secondary {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 20px;
      background: transparent;
      color: var(--accent-light, #5A91FF);
      border: 1px solid var(--accent);
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: rgba(41,98,255,0.1); }
  </style>
</head>
<body>

  <div class="verify-card" id="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Validando seu acesso...</h1>
    <p class="message" id="message">Aguarda só um instante.</p>
  </div>

  <script src="/assets/js/app.js"></script>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const card = document.getElementById('card');
      const spinner = document.getElementById('spinner');
      const title = document.getElementById('title');
      const message = document.getElementById('message');

      if (!token) {
        spinner.remove();
        card.innerHTML = '<div class="error-icon">⚠</div>' +
          '<h1>Link inválido</h1>' +
          '<p class="message">Esse link não tem um token de acesso. Volta pra página de login e tenta de novo.</p>' +
          '<a href="/login.html" class="btn-secondary">Ir pra login</a>';
        return;
      }

      const res = await window.BertaniApp.auth.verifyToken(token);

      if (res.ok && res.session) {
        spinner.remove();
        const tierLabel = res.session.tier.charAt(0).toUpperCase() + res.session.tier.slice(1);
        card.innerHTML = '<div class="success-icon">✓</div>' +
          '<h1>Tudo certo, ' + (res.session.nome ? res.session.nome.split(' ')[0] : '') + '!</h1>' +
          '<p class="message">Plano <strong>' + tierLabel + '</strong> ativo · sessão válida por 30 dias.<br>Redirecionando pro app...</p>';

        setTimeout(() => {
          window.location.href = window.BertaniApp.config.appHome;
        }, 1500);
      } else {
        spinner.remove();
        const errMsg = res.error || 'Não foi possível validar esse link.';
        card.innerHTML = '<div class="error-icon">⚠</div>' +
          '<h1>Link inválido ou expirado</h1>' +
          '<p class="message">' + errMsg + '</p>' +
          '<a href="/login.html" class="btn-secondary">Solicitar novo link</a>';
      }
    })();
  </script>
</body>
</html>
