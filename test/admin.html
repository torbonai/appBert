<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Boot · Admin · Bertani App</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .boot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; text-align: center; }
    .boot h1 { font-size: 24px; margin: 0; color: var(--accent); }
    .boot p { color: var(--muted); margin: 0; max-width: 440px; }
    .boot a { padding: 12px 20px; background: var(--card); border: 1px solid var(--border-bright); border-radius: 12px; text-decoration: none; color: var(--text); font-weight: 600; min-width: 280px; margin-top: 16px; }
    .boot a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="boot">
    <h1>🔐 Modo de teste · ADMIN</h1>
    <p>Key <code style="color: var(--accent);">ADMIN_renato_001</code> injetada. Acesso total ao app + página de tracking de briefings.</p>
    <a href="../briefing/admin.html">→ Página Admin · Tracking de Briefings</a>
    <a href="../dashboard.html">→ Dashboard (modo Tela Pro · admin libera tudo)</a>
    <a href="../briefing/track-record.html">→ Track Record (página pública)</a>
    <a href="logout.html">→ Sair (limpar key)</a>
  </div>
  <script>
    try { localStorage.setItem('bertani_access_key', 'ADMIN_renato_001'); } catch(e) {}
  </script>
</body>
</html>
