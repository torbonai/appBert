<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Admin · Tracking Briefings · Bertani</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232962FF%22/><text x=%2250%22 y=%2266%22 font-size=%2256%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22monospace%22 font-weight=%22bold%22>B</text></svg>">

  <style>
    .admin-banner {
      background: linear-gradient(90deg, var(--accent-dark), var(--accent));
      color: white; padding: 10px var(--s-5); text-align: center;
      font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
    }
    .a-hero { padding: var(--s-7) 0 var(--s-3); position: relative; }
    .a-hero::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(900px 350px at 50% -10%, rgba(41, 98, 255, 0.15), transparent 60%);
      pointer-events: none;
    }
    .a-titulo { font-size: 32px; margin: 0 0 var(--s-2); }
    .a-sub { font-size: 14px; color: var(--text-2); margin: 0; max-width: 720px; }
    .modo-tabs {
      display: flex; gap: var(--s-2);
      margin: var(--s-5) 0 var(--s-4);
      border-bottom: 1px solid var(--border);
    }
    .modo-tab {
      padding: 12px 20px; background: transparent; border: 0;
      color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: all var(--t-fast);
    }
    .modo-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .modo-tab:hover { color: var(--text); }
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: var(--s-6);
      margin-bottom: var(--s-4);
    }
    .panel h2 { font-size: 18px; margin: 0 0 var(--s-3); }
    .form-row { margin-bottom: var(--s-3); }
    .form-row label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-row .hint { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
    .input, .select, .textarea {
      width: 100%; background: var(--bg-2); border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm); padding: 8px 12px;
      color: var(--text); font-family: var(--mono); font-size: 13px;
    }
    .input:focus, .select:focus, .textarea:focus { outline: 0; border-color: var(--accent); }
    .textarea { resize: vertical; min-height: 50px; font-family: var(--sans); font-size: 13px; }
    input[type="number"] { text-align: right; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-3); }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s-3); }
    .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: var(--s-3); }
    @media (max-width: 768px) { .row-2, .row-3, .row-4 { grid-template-columns: 1fr; } }
    .ativo-card {
      background: var(--bg-2); border: 1px solid var(--border-bright);
      border-radius: var(--radius); padding: var(--s-4) var(--s-5);
      margin-bottom: var(--s-4);
    }
    .ativo-card.win { border-left: 4px solid var(--accent); }
    .ativo-card.wdo { border-left: 4px solid var(--gold); }
    .ativo-card-header {
      display: flex; gap: var(--s-3); align-items: center;
      margin-bottom: var(--s-3); padding-bottom: var(--s-3);
      border-bottom: 1px solid var(--border);
    }
    .ativo-codigo { font-family: var(--mono); font-size: 22px; font-weight: 700; }
    .ativo-pill {
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    }
    .pill-go { background: rgba(212, 175, 55, 0.15); color: var(--gold); border: 1px solid var(--gold); }
    .pill-aguardar { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
    .btn-action {
      display: block; width: 100%;
      padding: 14px 24px;
      background: var(--accent); color: white;
      border: 0; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; text-transform: uppercase;
    }
    .btn-action:hover { background: var(--accent-hover); }
    .btn-action:disabled { background: var(--muted-2); cursor: not-allowed; }
    .btn-action.gold { background: var(--gold); color: var(--bg); }
    .btn-action.gold:hover { background: #E5C247; }
    .log-area {
      margin-top: var(--s-4); padding: var(--s-4);
      background: var(--bg-2); border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      font-family: var(--mono); font-size: 12px;
      max-height: 240px; overflow-y: auto;
    }
    .log-line { padding: 2px 0; }
    .log-line.ok { color: var(--green); }
    .log-line.err { color: var(--warn); }
    .log-line.info { color: var(--text-2); }
    .acesso-bloqueado {
      max-width: 480px; margin: var(--s-8) auto;
      text-align: center; padding: var(--s-6);
      background: var(--card); border: 1px solid var(--warn);
      border-radius: var(--radius);
    }
    .acesso-bloqueado h2 { color: var(--warn); }
    .acesso-bloqueado p { color: var(--text-2); margin: var(--s-3) 0; }
    .breadcrumb { font-size: 13px; color: var(--muted); margin-bottom: var(--s-3); }
    .breadcrumb a { color: var(--muted); }
    .tip-box {
      background: rgba(41, 98, 255, 0.06); border-left: 3px solid var(--accent);
      padding: var(--s-3) var(--s-4); border-radius: var(--radius-sm);
      margin: var(--s-3) 0; font-size: 13px; color: var(--text-2); line-height: 1.5;
    }
    .tip-box strong { color: var(--accent); }
    .tip-box.warn {
      background: var(--warn-soft); border-left-color: var(--warn);
    }
    .tip-box.warn strong { color: var(--warn); }
    .row-id {
      background: var(--bg-2); padding: 8px 12px;
      border-radius: var(--radius-sm); border: 1px solid var(--border-bright);
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      margin-bottom: var(--s-3);
    }
    .row-id strong { color: var(--text); }
  </style>
</head>
<body>

  <div class="admin-banner">🔐 ADMIN · Tracking de Briefings · Conectado ao Apps Script existente</div>

  <nav class="app-nav">
    <div class="wrap">
      <div class="brand">
        <div class="brand-mark">B</div>
        <span>BERTANI</span>
      </div>
      <div class="nav-links">
        <a href="../dashboard.html">Dashboard</a>
        <a href="do-dia.html">Briefing do dia</a>
        <a href="track-record.html">Track Record</a>
        <a href="admin.html" class="active">🔐 Admin</a>
      </div>
      <button class="btn" onclick="window.BertaniApp.access.logout()">Sair</button>
    </div>
  </nav>

  <main class="wrap" style="padding-bottom: var(--s-8);" id="main-area">
    <div id="loading" style="text-align: center; padding: var(--s-8);">
      <p style="color: var(--muted);">Verificando acesso...</p>
    </div>
  </main>

  <footer class="app-footer"><div class="wrap"><p>© 2026 Renato Bertani · CNPI T 9644</p></div></footer>

  <script src="../assets/js/app.js"></script>
  <script>
    (function () {
      'use strict';
      var APP = window.BertaniApp;
      var mainArea = document.getElementById('main-area');

      // ============== ACESSO ==============
      if (!APP.access.isAdmin()) {
        mainArea.innerHTML =
          '<div class="acesso-bloqueado">' +
            '<h2>🔐 Acesso restrito</h2>' +
            '<p>Esta página é exclusiva pra administradores.</p>' +
            '<p style="font-size: 12px;">Pra ativar, use uma key começando com <code>ADMIN_</code>.<br>' +
            'Ex: <a href="?key=ADMIN_renato_001">admin.html?key=ADMIN_renato_001</a></p>' +
          '</div>';
        return;
      }

      // ============== CONFIG ==============
      var SCRIPT_URL = APP.config.sheetsEndpoint;
      var TOKEN = APP.config.sheetsToken;

      // ============== UI: 2 MODOS ==============
      mainArea.innerHTML =
        '<header class="a-hero"><div>' +
          '<p class="breadcrumb"><a href="../dashboard.html">Dashboard</a> › <a href="track-record.html">Track Record</a> › Admin</p>' +
          '<h1 class="a-titulo">📤 Tracking de Briefings · aba Track Record</h1>' +
          '<p class="a-sub">Carrega JSON do briefing → preenche campos editáveis → lança 1 linha por ativo na planilha existente. Pontos e Resultado(R) calculados automaticamente pelas fórmulas da planilha.</p>' +
        '</div></header>' +
        '<div class="modo-tabs">' +
          '<button class="modo-tab active" data-modo="publicar">📤 Lançar briefing (manhã)</button>' +
          '<button class="modo-tab" data-modo="resultado">✅ Atualizar resultado (D+1)</button>' +
        '</div>' +
        '<div id="modo-publicar"></div>' +
        '<div id="modo-resultado" style="display: none;"></div>';

      document.querySelectorAll('.modo-tab').forEach(function (b) {
        b.addEventListener('click', function () {
          document.querySelectorAll('.modo-tab').forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
          document.getElementById('modo-publicar').style.display = b.dataset.modo === 'publicar' ? '' : 'none';
          document.getElementById('modo-resultado').style.display = b.dataset.modo === 'resultado' ? '' : 'none';
        });
      });

      renderModoPublicar();
      renderModoResultado();

      // ============== HELPERS ==============
      function todayISO() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }
      function isoToBR(iso) {
        if (!iso) return '';
        var p = iso.split('-');
        return p[2] + '/' + p[1] + '/' + p[0];
      }
      function loadJSON(data) {
        return fetch('./' + data + '.json').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; });
      }
      function buildUrl(action, params) {
        var qs = new URLSearchParams({ token: TOKEN, action: action });
        Object.keys(params).forEach(function (k) {
          var v = params[k];
          if (v !== null && v !== undefined && v !== '') qs.append(k, String(v));
        });
        return SCRIPT_URL + '?' + qs.toString();
      }
      function logLine(target, msg, cls) {
        var el = document.createElement('div');
        el.className = 'log-line ' + (cls || 'info');
        el.textContent = '[' + new Date().toLocaleTimeString('pt-BR') + '] ' + msg;
        target.appendChild(el);
        target.scrollTop = target.scrollHeight;
      }

      // Sugestão de contrato vigente baseado na data
      function sugerirContrato(codigoBase, dataISO) {
        if (!dataISO) return codigoBase;
        var d = new Date(dataISO + 'T12:00:00');
        var mes = d.getMonth() + 1; // 1-12
        var ano = String(d.getFullYear()).slice(2);
        var wdoLetras = ['F','G','H','J','K','M','N','Q','U','V','X','Z'];
        var winLetras = { 1:'G', 2:'G', 3:'J', 4:'J', 5:'M', 6:'M', 7:'Q', 8:'Q', 9:'V', 10:'V', 11:'Z', 12:'Z' };
        if (codigoBase.indexOf('WDO') === 0) {
          // WDO vence dia 1 do próximo mês · em qualquer dia do mês X o vigente é o que vence próximo mês = letra do mês X+1
          var venceMes = mes + 1;
          if (venceMes > 12) { venceMes = 1; ano = String(d.getFullYear() + 1).slice(2); }
          return 'WDO' + wdoLetras[venceMes - 1] + ano;
        }
        if (codigoBase.indexOf('WIN') === 0) {
          // WIN vence 3a quarta do mês par · usa mapping
          return 'WIN' + winLetras[mes] + ano;
        }
        return codigoBase;
      }

      // Mapping kill_zone do JSON → texto da planilha (drop-down do Renato)
      function mapKillZone(klista) {
        if (!klista || klista.length === 0) return '';
        var k = klista[0].toLowerCase();
        if (k.indexOf('11h30') >= 0 || k.indexOf('11:30') >= 0 || k.indexOf('almo') >= 0) return 'Meio (10-13h30)';
        if (k.indexOf('abertura') >= 0 || k.indexOf('9h') >= 0 || k.indexOf('9:') >= 0) return 'Abertura (9-10h)';
        if (k.indexOf('14h') >= 0 || k.indexOf('14:') >= 0 || k.indexOf('ny') >= 0) return 'Tarde (13h30-15h)';
        if (k.indexOf('fechamento') >= 0 || k.indexOf('16h') >= 0 || k.indexOf('17h') >= 0) return 'Fechamento (15h-17h55)';
        return klista[0];
      }

      // Sugestão de Setup baseado em fase + plano
      function sugerirSetup(ativo) {
        if (!ativo.plano) return 'Sem setup';
        var fase = (ativo.fase_wyckoff || '').toLowerCase();
        var dir = (ativo.plano.direcao || '').toLowerCase();
        if (fase.indexOf('phase c') >= 0 || fase.indexOf('fase c') >= 0) {
          return dir === 'short' ? 'Upthrust' : 'Spring';
        }
        if (dir === 'short') return 'OB Bearish';
        if (dir === 'long') return 'OB Bullish';
        return '';
      }

      // ============== MODO 1: LANÇAR BRIEFING ==============
      function renderModoPublicar() {
        var box = document.getElementById('modo-publicar');
        box.innerHTML =
          '<div class="panel">' +
            '<h2>1 · Carregar briefing do dia</h2>' +
            '<div class="row-2">' +
              '<div class="form-row"><label>Data do briefing</label><input type="date" class="input" id="pub-data" value="' + todayISO() + '"></div>' +
              '<div class="form-row" style="display: flex; align-items: flex-end;"><button class="btn-action" id="pub-carregar" style="height: 38px;">📂 Carregar JSON</button></div>' +
            '</div>' +
            '<p class="hint">JSON correspondente em <code>briefing/YYYY-MM-DD.json</code></p>' +
          '</div>' +
          '<div id="pub-preview"></div>' +
          '<div class="log-area" id="pub-log" style="display: none;"></div>';

        document.getElementById('pub-carregar').addEventListener('click', carregarPublicar);
      }

      function carregarPublicar() {
        var data = document.getElementById('pub-data').value;
        var preview = document.getElementById('pub-preview');
        preview.innerHTML = '<div class="panel"><p style="color: var(--muted);">⏳ Carregando JSON...</p></div>';

        loadJSON(data).then(function (b) {
          if (!b) {
            preview.innerHTML = '<div class="panel"><p style="color: var(--warn);">❌ JSON não encontrado em <code>' + data + '.json</code>. Verifique o arquivo.</p></div>';
            return;
          }

          var dataBR = isoToBR(b.data);
          var hora = (b.hora_publicacao || '08:30').replace(' BRT', '').trim();

          var html = '<div class="panel">';
          html += '<h2>2 · Editar dados pra cada ativo · Edição #' + b.edicao + ' · ' + dataBR + '</h2>';
          html += '<div class="tip-box"><strong>💡 Como funciona:</strong> 1 linha por ATIVO na aba <code>Track Record</code>. Status sai como "Planejado" pra setups armados ou "Sem setup" pra AGUARDAR. Pontos/Resultado(R) auto-calculam quando você preencher Saída no D+1.</div>';

          b.ativos.forEach(function (a, idx) {
            var temPlano = !!(a.plano && a.plano.entry_zona);
            var direcao = temPlano ? (a.plano.direcao === 'SHORT' ? 'Short' : 'Long') : 'Neutro';
            var ativoCls = a.codigo.indexOf('WIN') === 0 ? 'win' : 'wdo';
            var ativoSugerido = sugerirContrato(a.codigo.replace('1!', ''), b.data);

            // Calcula entry centro da zona (se tiver)
            var entryRef = '', slRef = '', tp1 = '', tp2 = '', rr = '';
            if (temPlano) {
              var zonaParts = String(a.plano.entry_zona).split('-').map(function (s) {
                return parseFloat(String(s).trim().replace(/\./g, '').replace(',', '.'));
              });
              entryRef = ((zonaParts[0] + (zonaParts[1] || zonaParts[0])) / 2).toFixed(2);
              slRef = a.plano.stop || '';
              tp1 = a.plano.tp1 || '';
              tp2 = a.plano.tp2 || '';
              rr = a.plano.tp1_rr || '';
            }

            var killZone = mapKillZone(b.kill_zones_recomendadas || []);
            var setup = temPlano ? sugerirSetup(a) : 'Sem setup';
            var status = temPlano ? 'Planejado' : 'Sem setup';

            // Notas: se AGUARDAR, vai motivo; se setup, vai racional curto
            var notasBase = a.comentario_breve || a.racional_publico || '';

            html += '<div class="ativo-card ' + ativoCls + '" data-idx="' + idx + '">';
            html += '<div class="ativo-card-header">';
            html += '<span class="ativo-codigo">' + a.codigo + '</span>';
            html += '<span class="ativo-pill ' + (temPlano ? 'pill-go' : 'pill-aguardar') + '">' + a.veredito + '</span>';
            html += '</div>';

            html += '<div class="row-3">';
            html += '<div class="form-row"><label>Data (A)</label><input class="input" data-c="data" value="' + dataBR + '"></div>';
            html += '<div class="form-row"><label>Hora (B)</label><input class="input" data-c="hora" value="' + hora + '"></div>';
            html += '<div class="form-row"><label>Ativo (C) · contrato vigente</label><input class="input" data-c="ativo" value="' + ativoSugerido + '" title="Sugestão: ' + ativoSugerido + ' baseado na data. Edite se for outro mês."></div>';
            html += '</div>';

            html += '<div class="row-3">';
            html += '<div class="form-row"><label>Direção (D)</label><select class="select" data-c="direcao"><option' + (direcao === 'Long' ? ' selected' : '') + '>Long</option><option' + (direcao === 'Short' ? ' selected' : '') + '>Short</option><option' + (direcao === 'Neutro' ? ' selected' : '') + '>Neutro</option></select></div>';
            html += '<div class="form-row"><label>Fase Wyckoff (E)</label><input class="input" data-c="fase_wyckoff" value="' + (a.fase_wyckoff || '') + '"></div>';
            html += '<div class="form-row"><label>Score (G) · 0-10</label><input class="input" type="number" step="0.1" min="0" max="10" data-c="score" value="' + (a.score || '') + '"></div>';
            html += '</div>';

            html += '<div class="form-row"><label>Contexto ICT (F)</label><input class="input" data-c="contexto_ict" value="' + (temPlano ? 'MSS 15m + OB H1 + FVG retest' : 'Sem gatilho ICT') + '"></div>';

            html += '<div class="row-4">';
            html += '<div class="form-row"><label>Entry (H)</label><input class="input" type="number" step="0.5" data-c="entry" value="' + entryRef + '"></div>';
            html += '<div class="form-row"><label>SL (I)</label><input class="input" type="number" step="0.5" data-c="sl" value="' + slRef + '"></div>';
            html += '<div class="form-row"><label>TP1 (J)</label><input class="input" type="number" step="0.5" data-c="tp1" value="' + tp1 + '"></div>';
            html += '<div class="form-row"><label>TP2 (K)</label><input class="input" type="number" step="0.5" data-c="tp2" value="' + tp2 + '"></div>';
            html += '</div>';

            html += '<div class="row-3">';
            html += '<div class="form-row"><label>R:R Plan (L) · TP1</label><input class="input" type="number" step="0.1" data-c="rr_plan" value="' + rr + '"></div>';
            html += '<div class="form-row"><label>Kill Zone (Q)</label><select class="select" data-c="kill_zone"><option value="">—</option>' +
              ['Abertura (9-10h)', 'Meio (10-13h30)', 'Tarde (13h30-15h)', 'Fechamento (15h-17h55)'].map(function (k) {
                return '<option' + (k === killZone ? ' selected' : '') + '>' + k + '</option>';
              }).join('') + '</select></div>';
            html += '<div class="form-row"><label>Setup (R)</label><select class="select" data-c="setup">' +
              ['Spring', 'Upthrust', 'OB Bullish', 'OB Bearish', 'FVG Long', 'FVG Short', 'MSS Long', 'MSS Short', 'BOS', 'Sem setup', 'Outro'].map(function (s) {
                return '<option' + (s === setup ? ' selected' : '') + '>' + s + '</option>';
              }).join('') + '</select></div>';
            html += '</div>';

            html += '<div class="row-2">';
            html += '<div class="form-row"><label>Status (N)</label><input class="input" data-c="status" value="' + status + '"></div>';
            html += '<div class="form-row"><label>Notas (S)</label><input class="input" data-c="notas" value="' + notasBase.replace(/"/g, '&quot;') + '"></div>';
            html += '</div>';

            html += '</div>'; // fim ativo-card
          });

          html += '<button class="btn-action gold" id="pub-disparar">📤 Lançar ' + b.ativos.length + ' linha(s) na aba Track Record</button>';
          html += '</div>'; // fim panel
          preview.innerHTML = html;

          document.getElementById('pub-disparar').addEventListener('click', function () { disparararPublicar(b); });
        });
      }

      function disparararPublicar(briefing) {
        var btn = document.getElementById('pub-disparar');
        btn.disabled = true;
        btn.textContent = 'Disparando...';
        var logEl = document.getElementById('pub-log');
        logEl.style.display = '';
        logEl.innerHTML = '';
        logLine(logEl, 'Iniciando ' + briefing.ativos.length + ' lançamento(s)', 'info');

        var promises = [];
        document.querySelectorAll('#pub-preview .ativo-card').forEach(function (card) {
          var params = {};
          card.querySelectorAll('[data-c]').forEach(function (el) {
            params[el.dataset.c] = el.value;
          });
          var ativo = params.ativo;
          var url = buildUrl('append', params);
          logLine(logEl, '→ POST ' + ativo + '...', 'info');
          var p = fetch(url, { mode: 'no-cors' })
            .then(function () {
              logLine(logEl, '✓ ' + ativo + ' enviado (no-cors · resposta opaca)', 'ok');
              return { ok: true, ativo: ativo };
            })
            .catch(function (err) {
              logLine(logEl, '✗ ' + ativo + ' erro: ' + err.message, 'err');
              return { ok: false, ativo: ativo };
            });
          promises.push(p);
        });

        Promise.all(promises).then(function (results) {
          var ok = results.filter(function (r) { return r.ok; }).length;
          logLine(logEl, '═══ Concluído · ' + ok + '/' + results.length + ' OK ═══', 'ok');
          logLine(logEl, '⚠ Confira a planilha pra confirmar:', 'info');
          logLine(logEl, APP.config.trackRecordPublic, 'info');
          btn.textContent = '✓ Lançado · clique pra repetir';
          btn.disabled = false;
        });
      }

      // ============== MODO 2: ATUALIZAR RESULTADO (action=update) ==============
      function renderModoResultado() {
        var box = document.getElementById('modo-resultado');
        box.innerHTML =
          '<div class="panel">' +
            '<h2>1 · Atualizar resultado de uma linha existente</h2>' +
            '<div class="tip-box warn"><strong>⚠ Você precisa do número da linha</strong> da planilha (1ª coluna lateral). Por exemplo: linha 6 = primeira linha de dado abaixo do cabeçalho. Use Ctrl+End na planilha pra encontrar a última linha preenchida.</div>' +

            '<div class="row-2">' +
              '<div class="form-row"><label>Linha (número)</label><input class="input" type="number" id="upd-row" min="5" placeholder="Ex: 6"></div>' +
              '<div class="form-row" style="display: flex; align-items: flex-end;"><div style="font-size: 11px; color: var(--muted);">Apps Script atualiza colunas M (Saída), N (Status) e S (Notas) dessa linha.</div></div>' +
            '</div>' +

            '<div class="form-row"><label>Saída (M) · preço de saída real</label><input class="input" type="number" step="0.5" id="upd-saida" placeholder="Ex: 4985 (preço onde fechou o trade)"></div>' +

            '<div class="form-row"><label>Status (N) · resultado</label>' +
              '<select class="select" id="upd-status">' +
                '<option value="">— escolha —</option>' +
                '<option>TP1</option>' +
                '<option>TP2</option>' +
                '<option>SL</option>' +
                '<option>BE</option>' +
                '<option>MSS contra</option>' +
                '<option>Parcial</option>' +
                '<option>Sem setup</option>' +
                '<option>Não acionou</option>' +
                '<option>Paper trade — não executado</option>' +
              '</select>' +
            '</div>' +

            '<div class="form-row"><label>Notas (S) · obrigatório em losses</label><textarea class="textarea" id="upd-notas" placeholder="O que aconteceu? Qual lição? Em losses é obrigatório anotar."></textarea></div>' +

            '<button class="btn-action gold" id="upd-disparar">📤 Atualizar linha</button>' +
          '</div>' +
          '<div class="log-area" id="upd-log" style="display: none;"></div>';

        document.getElementById('upd-disparar').addEventListener('click', dispararResultado);
      }

      function dispararResultado() {
        var row = parseInt(document.getElementById('upd-row').value, 10);
        if (!row || row < 5) {
          alert('Linha inválida. Use número >= 5 (5 é a primeira linha de dado).');
          return;
        }

        var btn = document.getElementById('upd-disparar');
        btn.disabled = true;
        btn.textContent = 'Disparando...';
        var logEl = document.getElementById('upd-log');
        logEl.style.display = '';
        logEl.innerHTML = '';

        var params = {
          row: row,
          saida: document.getElementById('upd-saida').value,
          status: document.getElementById('upd-status').value,
          notas: document.getElementById('upd-notas').value
        };

        var url = buildUrl('update', params);
        logLine(logEl, '→ UPDATE linha ' + row + '...', 'info');

        fetch(url, { mode: 'no-cors' })
          .then(function () {
            logLine(logEl, '✓ Linha ' + row + ' atualizada (no-cors · resposta opaca)', 'ok');
            logLine(logEl, '⚠ Confira a planilha:', 'info');
            logLine(logEl, APP.config.trackRecordPublic, 'info');
            btn.textContent = '✓ Atualizado · clique pra outra';
            btn.disabled = false;
          })
          .catch(function (err) {
            logLine(logEl, '✗ Erro: ' + err.message, 'err');
            btn.textContent = '📤 Tentar novamente';
            btn.disabled = false;
          });
      }
    })();
  </script>
</body>
</html>
