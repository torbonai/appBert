<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Logout · Bertani App</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .boot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; text-align: center; }
    .boot h1 { font-size: 24px; margin: 0; color: var(--muted); }
    .boot a { padding: 12px 20px; background: var(--card); border: 1px solid var(--border-bright); border-radius: 12px; text-decoration: none; color: var(--text); font-weight: 600; min-width: 280px; margin-top: 16px; }
    .boot a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="boot">
    <h1>🚪 Saída · key removida</h1>
    <p style="color: var(--muted);">localStorage limpo. Modo Demo ativo.</p>
    <a href="../dashboard.html">→ Voltar ao Dashboard (modo Demo)</a>
    <a href="telapro.html">→ Reentrar como Tela Pro</a>
  </div>
  <script>
    try {
      localStorage.removeItem('bertani_access_key');
      localStorage.removeItem('bertani_calc_input');
    } catch(e) {}
  </script>
</body>
</html>
